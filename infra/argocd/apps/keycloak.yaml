apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keycloak
  namespace: argocd
spec:
  project: infra
  source:
    # Local Helm chart using the official upstream Keycloak image
    # (quay.io/keycloak/keycloak). Replaces the Bitnami chart whose
    # container images were removed from Docker Hub by Broadcom.
    repoURL: git@github.com:risquanter/register-infra.git
    path: infra/helm/keycloak
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
