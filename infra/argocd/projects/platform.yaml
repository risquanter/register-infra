apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform
  namespace: argocd
spec:
  description: >-
    Platform concerns: namespace provisioning, mesh policy, network policy,
    OPA ext_authz, Kyverno ClusterPolicy instances, PeerAuthentication.
    Creates Namespace and ClusterPolicy (cluster-scoped).

  # Valid sources: infra repo only.
  sourceRepos:
    - "git@github.com:risquanter/register-infra.git"

  # Cluster-scoped resources this project may create.
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    # Kyverno ClusterPolicy instances (CRDs installed by kyverno project)
    - group: kyverno.io
      kind: ClusterPolicy
    # cert-manager ClusterIssuer for ingress-gateway TLS (infra/k8s/cert-manager)
    - group: cert-manager.io
      kind: ClusterIssuer

  # Namespace-scoped destinations.
  destinations:
    # Namespaces chart uses "default" as release namespace (namespaces are cluster-scoped)
    - server: https://kubernetes.default.svc
      namespace: default
    # Mesh policy, network policy, OPA, PeerAuthentication target register
    - server: https://kubernetes.default.svc
      namespace: register
    # PeerAuthentication may target argocd
    - server: https://kubernetes.default.svc
      namespace: argocd
    # Istio system-level PeerAuthentication
    - server: https://kubernetes.default.svc
      namespace: istio-system
    # Infra namespace network policies
    - server: https://kubernetes.default.svc
      namespace: infra
    # Kyverno namespace — the namespaces chart creates its LimitRange here
    # (namespace itself is cluster-scoped via clusterResourceWhitelist).
    - server: https://kubernetes.default.svc
      namespace: kyverno

  # Namespace-scoped resource kinds this project may create.
  # Broad enough for mesh policy + OPA + network policy + RBAC.
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: LimitRange
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: apps
      kind: Deployment
    - group: networking.k8s.io
      kind: NetworkPolicy
    - group: cilium.io
      kind: CiliumNetworkPolicy
    - group: networking.istio.io
      kind: EnvoyFilter
    - group: security.istio.io
      kind: RequestAuthentication
    - group: security.istio.io
      kind: AuthorizationPolicy
    - group: security.istio.io
      kind: PeerAuthentication
    - group: gateway.networking.k8s.io
      kind: Gateway
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
    # cert-manager Certificate for the ingress-gateway TLS secret (register ns)
    - group: cert-manager.io
      kind: Certificate
    - group: policy
      kind: PodDisruptionBudget
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: ""
      kind: Secret
