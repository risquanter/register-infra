---
# PeerAuthentication — enforce STRICT mTLS for the register namespace.
# Without this, a non-meshed pod could connect to meshed pods using plaintext,
# bypassing the waypoint and all L7 security controls.
#
# This is the mTLS half of THREAT-CATALOG T1 (mesh bypass prevention).
# The other half is NetworkPolicy (only waypoint can reach app pods).
#
# STRICT mode means:
#   - All incoming connections MUST present a valid mesh certificate (SPIFFE)
#   - Plaintext TCP connections are rejected at the ztunnel level
#   - Pods not enrolled in the mesh cannot reach pods in this namespace
#
# Currently applied per-namespace (register, argocd). Mesh-wide STRICT
# (istio-system) is deferred until all namespaces are enrolled and tested —
# specifically, the infra namespace (PostgreSQL/Keycloak) needs verification
# that ztunnel + PeerAuthentication STRICT doesn't break liveness probes.
#
# TODO: Promote to mesh-wide STRICT in istio-system when:
#   1. The infra namespace has been verified with STRICT PeerAuthentication
#      (PostgreSQL and Keycloak probes survive ztunnel + mTLS interception)
#   2. The observability namespace is enrolled in the mesh (meshEnroll: true)
#   3. Any future namespaces (e.g., SpiceDB) are enrolled and tested
#   At that point, replace these per-namespace resources with a single
#   PeerAuthentication in istio-system with mode: STRICT.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: register
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: argocd
spec:
  mtls:
    mode: STRICT
---
# OPA diagnostic port — allow plaintext kubelet health probes.
#
# In ambient mode, ztunnel enforces PeerAuthentication at the pod network
# namespace. STRICT mode rejects the kubelet's plaintext HTTP probes on port
# 8282 (the OPA /health endpoint). The sidecar-era annotation
# traffic.istio.io/excludeInboundPorts has no effect in ambient mode.
#
# This workload-scoped PeerAuthentication overrides only port 8282 on OPA pods
# to PERMISSIVE (accepts both plaintext and mTLS). All other ports remain
# STRICT via the namespace-wide policy above.
#
# Network-level access control on 8282 is still enforced by CiliumNetworkPolicy
# (fromCIDR: 169.254.7.127/32 — the ztunnel probe SNAT address). This is
# defense-in-depth: ztunnel permits the plaintext probe, Cilium restricts who
# can send it.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: opa-diag-permissive
  namespace: register
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: opa
  portLevelMtls:
    8282:
      mode: PERMISSIVE
---
# Register app — allow plaintext kubelet health probes on the dedicated health port.
#
# register-server v2 separates the API port (8090, STRICT mTLS) from the
# health-probe port (8091, PERMISSIVE). This mirrors the OPA pattern:
#   port 8090 (API)    → PeerAuthentication STRICT (namespace default)
#   port 8091 (probes) → PeerAuthentication PERMISSIVE (this policy)
#
# Network-level access control on 8091 is enforced by CiliumNetworkPolicy
# (fromCIDR: 169.254.7.127/32 — the ztunnel probe SNAT address).
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: register-probe-permissive
  namespace: register
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: register
  portLevelMtls:
    8091:
      mode: PERMISSIVE
---
# Frontend nginx pod — allow plaintext kubelet health probes on port 8080.
#
# nginx serves on port 8080 (non-privileged, uid 101). The kubelet probe
# arrives via ztunnel SNAT (169.254.7.127) as plaintext. PERMISSIVE on 8080
# allows the probe while all other traffic to the frontend must present a
# valid mesh certificate (STRICT namespace default).
#
# Network-level access control is enforced by CiliumNetworkPolicy
# allow-ingress-frontend-healthcheck (fromCIDR: 169.254.7.127/32).
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: frontend-probe-permissive
  namespace: register
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: frontend
  portLevelMtls:
    8080:
      mode: PERMISSIVE
