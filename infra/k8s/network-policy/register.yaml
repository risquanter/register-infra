---
# Default deny-all policy for the register namespace.
# No pod can receive or initiate traffic unless an explicit allow policy exists.
# This is the starting point — add targeted allow policies on top of this.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: register
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow Istio Ambient HBONE tunnels between all pods in the register namespace.
#
# HOW AMBIENT MODE CHANGES NETWORKPOLICY ENFORCEMENT
# In Istio Ambient mode, ztunnel intercepts ALL pod-to-pod TCP connections and
# wraps them in HBONE (HTTP-Based Overlay Network Encapsulation) on port 15008.
# This is the WIRE PROTOCOL — Cilium sees a TCP connection to port 15008, not to
# the application's port (8080, 8090, etc.). The application payload is encrypted
# inside the mTLS HBONE tunnel and invisible to Cilium.
#
# Consequence: per-service Cilium NetworkPolicy rules (e.g. allow register→irmin
# on port 8080) cannot be enforced at the Cilium layer for intra-namespace traffic.
# Without this HBONE rule, the default-deny-all policy blocks ALL cross-pod TCP
# connections, as ztunnel's connection attempts (port 15008) are dropped first.
#
# WHAT ENFORCES ACCESS CONTROL IN AMBIENT MODE?
# - L4 (identity):     PeerAuthentication STRICT → ztunnel rejects non-mTLS.
#                      Every pod gets a SPIFFE certificate; ztunnel verifies it.
# - L7 (HTTP/JWT):     AuthorizationPolicy targeting the waypoint Gateway.
#                      Enforced when a waypoint is deployed (production).
# - L3 (cross-ns):     The per-namespace/per-pod NetworkPolicy rules below are
#                      still meaningful for CROSS-NAMESPACE traffic (e.g. register
#                      → postgres in infra namespace), where HBONE is not used.
#
# The per-service rules (allow-ingress-irmin-from-register, etc.) are retained
# as documentation of the intended access topology and will become enforceable
# when Cilium's native Istio integration (Tetragon / CiliumClusterwideNetworkPolicy
# with L7 awareness) is added, or via the waypoint.
#
# HBONE source IP: ztunnel uses the SOURCE POD's IP for the HBONE connection
# (so Cilium identity-matching still correlates to the originating pod). On a
# single-node cluster this is intra-host; on multi-node it is inter-node.
# Restricting to namespaceSelector: register limits this to intra-namespace
# ambient traffic only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hbone-intra-namespace
  namespace: register
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: register
      ports:
        - protocol: TCP
          port: 15008
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: register
      ports:
        - protocol: TCP
          port: 15008
---
# Allow the register application to reach PostgreSQL in the infra namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-postgres
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: register
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
---
# Allow the register application to reach Keycloak in the infra namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-keycloak
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: register
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
          podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8080
---
# Allow ingress to the register application from the Istio waypoint proxy.
# The waypoint is what terminates external traffic after the mesh policy checks.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-waypoint
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: register
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: register
          podSelector:
            matchLabels:
              gateway.istio.io/managed: istio.io-mesh-controller
---
# Allow the Istio waypoint to call OPA over gRPC (ext_authz).
# The waypoint is the ext_authz client; OPA is the server on port 9191.
# Without this rule the default-deny-all policy would block the call and
# OPA's fail-closed mode would return 403 for every request.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-opa-from-waypoint
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: opa
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              gateway.istio.io/managed: istio.io-mesh-controller
      ports:
        - protocol: TCP
          port: 9191
---
# Allow the waypoint to egress to OPA on port 9191.
# The waypoint pod is also subject to the default-deny-all egress rule.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-waypoint-to-opa
  namespace: register
spec:
  podSelector:
    matchLabels:
      gateway.istio.io/managed: istio.io-mesh-controller
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: opa
      ports:
        - protocol: TCP
          port: 9191
---
# Allow the waypoint to forward approved requests to the register app.
# After JWT validation and OPA ext_authz pass, the waypoint proxies the
# request to the application pod on port 8080. Without this rule, the
# default-deny blocks the final hop and the app never receives traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-waypoint-to-register
  namespace: register
spec:
  podSelector:
    matchLabels:
      gateway.istio.io/managed: istio.io-mesh-controller
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: register
      ports:
        - protocol: TCP
          port: 8090
---
# Allow kubelet health probes to reach the OPA diagnostic port (8282).
#
# SECURITY NOTE: In Istio ambient mode, ztunnel uses SNAT to rewrite the source
# of kubelet health probes to 169.254.7.127 (a well-known link-local address)
# before they enter the pod's network namespace. This causes Cilium to see the
# probe as identity "world" instead of "host", so fromEntities: host does not
# match. fromCIDR: 169.254.7.127/32 targets exactly the ztunnel probe SNAT
# address — only traffic that ztunnel has already identified as a health probe
# reaches OPA on port 8282 via this path.
#
# Defense-in-depth layers on port 8282:
#   1. ztunnel SNAT: only local kubelet probes are rewritten to 169.254.7.127
#   2. CiliumNetworkPolicy: only 169.254.7.127 is allowed to reach 8282
#   3. PeerAuthentication (opa-diag-permissive): port 8282 accepts plaintext
#   4. No Service exposes 8282 — cluster-external access is impossible
#   5. OPA's diagnostic port also serves /metrics (Prometheus), but only the
#      ztunnel-SNATted kubelet can reach 8282, and it never requests /metrics
#
# DEPENDENCY: requires Cilium CNI + Istio ambient mode (both already in use).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-opa-healthcheck
  namespace: register
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: opa
  ingress:
    - fromCIDR:
        - 169.254.7.127/32
      toPorts:
        - ports:
            - port: "8282"
              protocol: TCP
---
# Allow kubelet health probes to reach the register app on the dedicated health port (8091).
#
# register-server v2 separates API (8090) from health probes (8091). The
# ztunnel SNAT mechanism is identical to the OPA healthcheck rule above:
# kubelet probes arrive from 169.254.7.127 after ztunnel SNAT rewrite.
# The standard NetworkPolicy (allow-ingress-from-waypoint) covers mTLS
# traffic from the waypoint to port 8090. This CiliumNetworkPolicy covers
# the plaintext kubelet probe path on port 8091.
#
# PeerAuthentication (register-probe-permissive) sets port 8091 PERMISSIVE
# so ztunnel does not reject the plaintext probe at the mTLS layer.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-register-healthcheck
  namespace: register
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: register
  ingress:
    - fromCIDR:
        - 169.254.7.127/32
      toPorts:
        - ports:
            - port: "8091"
              protocol: TCP
---
# Allow the Istio waypoint proxy egress to istiod on port 15012.
#
# The waypoint pod (managed by the Istio gateway controller) requires access to
# istiod.istio-system.svc:15012 for two purposes:
#   1. SPIFFE certificate signing (SDS/CA) — the waypoint must obtain a workload
#      certificate from the Citadel CA before it can participate in ztunnel mTLS.
#      Without this the waypoint crashes with "failed to sign CSR: i/o timeout".
#   2. xDS config push — istiod pushes Envoy route/listener/cluster config to the
#      waypoint over the same gRPC stream.
#
# KNOWN GAP: istiod's gateway controller generates the waypoint Deployment without
# seccompProfile.type=RuntimeDefault, which violates the register namespace's
# restricted PSS. A PostSync hook (see infra/k8s/istio/waypoint-pss-patch.yaml)
# patches this after every ArgoCD sync. Tracked in ADR-INFRA-008.
#
# Selector: gateway.istio.io/managed=istio.io-mesh-controller is the canonical
# label Istio places on all waypoint pods. This label is managed by istiod and
# cannot be spoofed by workloads in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-waypoint-to-istiod
  namespace: register
spec:
  podSelector:
    matchLabels:
      gateway.istio.io/managed: istio.io-mesh-controller
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: 15012
---
# Allow DNS egress for all register pods (app, OPA, waypoint, irmin).
# Required for Kubernetes service discovery (e.g., resolving
# postgresql-postgresql.infra.svc.cluster.local).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns
  namespace: register
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow the register application to reach Irmin (GraphQL, same namespace).
# Irmin is the persistence backend for risk tree data (repositoryType=irmin).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-register-to-irmin
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: register
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: irmin
      ports:
        - protocol: TCP
          port: 8080
---
# Allow ingress to Irmin from the register application.
# Only the register app should be able to read/write tree data.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-irmin-from-register
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: irmin
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: register
      ports:
        - protocol: TCP
          port: 8080
---
# Allow kubelet health probes to reach Irmin on port 8080.
# Same ztunnel SNAT mechanism as the OPA and register healthcheck rules:
# kubelet probes arrive from 169.254.7.127 after ztunnel SNAT rewrite.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-irmin-healthcheck
  namespace: register
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: irmin
  ingress:
    - fromCIDR:
        - 169.254.7.127/32
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# Allow the Istio waypoint to forward requests to the frontend nginx pod.
# In production the Istio Gateway routes all external traffic to the frontend.
# The waypoint is in the ingress path for L7 policy enforcement.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-frontend-from-waypoint
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              gateway.istio.io/managed: istio.io-mesh-controller
      ports:
        - protocol: TCP
          port: 8080
---
# Allow the frontend nginx pod to call the register API backend.
# nginx proxies API calls (Accept: application/json) to register:8090.
# DNS egress is already covered by the namespace-wide allow-egress-dns rule.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-frontend-to-register
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: register
      ports:
        - protocol: TCP
          port: 8090
---
# Allow kubelet health probes to reach the frontend nginx pod on port 8080.
# Same ztunnel SNAT mechanism as OPA, register, and irmin healthcheck rules.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-frontend-healthcheck
  namespace: register
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: frontend
  ingress:
    - fromCIDR:
        - 169.254.7.127/32
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# Allow the waypoint-pss-patch PostSync Job to reach the Kubernetes API server.
# The Job runs `kubectl patch deployment waypoint` which needs egress to the
# API server (kubernetes.default.svc on port 443). Without this rule the
# default-deny-all policy blocks the connection and the Job fails with
# "TLS handshake timeout".
#
# Selector: job-name=waypoint-pss-patch is set by the Job controller on all
# pods it creates. This scopes the rule to only the patcher pod.
#
# This rule will be removed when the PostSync hook is replaced by a Kyverno
# mutating policy (planned post-demo).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-pss-patcher-to-apiserver
  namespace: register
spec:
  podSelector:
    matchLabels:
      job-name: waypoint-pss-patch
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: TCP
          port: 443
