apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: require-jwt
  namespace: register
spec:
  # targetRef scopes this policy to the waypoint proxy (L7), NOT to individual
  # pods via selector. This is the correct Istio Ambient pattern for HTTP-level
  # rules (JWT, paths).
  #
  # WHY NOT selector: {}
  # ztunnel operates at L4 and cannot evaluate HTTP attributes (requestPrincipals,
  # paths). When an ALLOW policy with only HTTP rules is attached to a pod via
  # selector, ztunnel silently omits all rules → the policy has zero effective
  # rules → any workload matched by the selector is in "deny by default" mode at
  # L4 → all east-west (pod-to-pod) TCP connections in the namespace are blocked.
  #
  # HOW THIS INTERACTS WITH SECURITY
  # With targetRef, ztunnel does not evaluate this policy. L4 enforcement is
  # provided by PeerAuthentication STRICT (mTLS required for all mesh traffic).
  # JWT and path enforcement are activated when the waypoint Gateway is deployed
  # (production / Hetzner phase). In local k3d (no waypoint), no JWT enforcement
  # is in effect — this is acceptable for dev. See Ambiguity A4 in action plan.
  targetRef:
    group: gateway.networking.k8s.io
    kind: Gateway
    name: waypoint
  action: ALLOW
  rules:
    - # Authenticated routes: require a valid JWT (any principal).
      from:
        - source:
            # requestPrincipal is set only when a valid JWT was presented and
            # validated by the RequestAuthentication policy above.
            # An empty or missing JWT will have no principal → this rule does
            # not match → the request is denied (default deny when rules exist).
            requestPrincipals: ["*"]
    - # Public routes: no JWT required.
      # These paths are accessible without authentication — the capability URL
      # or the endpoint's nature (health probe) is the sole credential.
      # ADR-021 (capability URLs), AUTHORIZATION-PLAN L1.5 route matrix.
      to:
        - operation:
            paths:
              - "/w/*"                # Layer 0 capability routes (ADR-021)
              - "/workspaces/*"       # workspace bootstrap — pre-resource (route matrix row 3)
              - "/health"             # always public (route matrix row 1)

# ── REMOVED: deny-forwarded-identity-headers ─────────────────────────────────
#
# A DENY AuthorizationPolicy that checked request.headers[x-user-id] was here
# previously. It was intended as defence-in-depth: block requests where x-user-id
# was pre-set by an external client.
#
# WHY IT WAS REMOVED: Envoy evaluates filters in this order:
#   1. HttpConnectionManager request_headers_to_remove  → strips x-user-id  ✅
#   2. jwt_authn (RequestAuthentication) → validates JWT, then
#      outputClaimToHeaders RE-ADDS x-user-id from the JWT sub claim
#   3. rbac (AuthorizationPolicy) → evaluates DENY policies first
#
# At step 3, x-user-id IS present (legitimately, from step 2). The DENY policy
# matched every authenticated request, returning 403 for all valid traffic.
# Public routes (no JWT → no outputClaimToHeaders → no x-user-id) were
# unaffected, making the bug hard to spot without end-to-end testing.
#
# HEADER STRIPPING IS STILL ENFORCED by the EnvoyFilter at
# infra/k8s/istio/envoy-filter-strip-headers.yaml. The EnvoyFilter operates at
# the HttpConnectionManager level (step 1), which runs before any HTTP filter.
# There is no known mechanism to bypass it in Envoy's architecture.
#
# Remaining defence-in-depth layers:
#   - EnvoyFilter strips external x-user-* headers           (L7 - waypoint)
#   - RequestAuthentication validates JWT, adds trusted headers (L7 - waypoint)
#   - PeerAuthentication STRICT rejects non-mesh traffic        (L4 - ztunnel)
#   - NetworkPolicy restricts ingress to app pods from waypoint (L3 - Cilium)
#
# See ADR-012 §5-§6, THREAT-CATALOG T3 (header forgery).
