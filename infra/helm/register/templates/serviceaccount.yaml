apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "register.labels" . | nindent 4 }}
# The register application does not call the Kubernetes API.
# Disabling token mounting removes a credential that a compromised pod could abuse.
automountServiceAccountToken: false
