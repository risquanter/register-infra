---
# Kyverno ClusterPolicy: inject seccompProfile.type=RuntimeDefault into any pod
# that doesn't already have one set at the pod level.
#
# WHY THIS EXISTS
# The Istio gateway controller (istiod) auto-generates the waypoint Deployment
# from an internal template that does NOT include seccompProfile in the pod
# security context. Namespaces enforcing restricted PSS (like register) reject
# pods without seccompProfile, causing the waypoint to fail scheduling.
#
# This policy replaces the fragile PostSync kubectl-patch Job that previously
# solved this problem. Unlike the Job pattern, this is:
#   - Declarative: lives in git, synced by ArgoCD
#   - Instant: applied at admission time, before the pod is created
#   - No dependencies: no container image to pull, no Job lifecycle
#   - Universal: covers any future controller-generated pod missing seccompProfile
#
# WHEN THIS WILL BE OBSOLETE
# When istiod adds seccompProfile natively to the waypoint Deployment template.
# Track upstream: https://github.com/istio/istio/issues (search: waypoint
# seccompProfile restricted PSS). Remove this policy when resolved.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: inject-seccomp-profile
  annotations:
    policies.kyverno.io/title: Inject seccompProfile RuntimeDefault
    policies.kyverno.io/category: Pod Security Standards
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Mutates pods that lack a pod-level seccompProfile to add
      seccompProfile.type=RuntimeDefault. Targets the register namespace
      to fix waypoint pods generated by istiod without PSS compliance.
spec:
  # Fail open: if Kyverno is down, pods are created without mutation rather
  # than being rejected. The waypoint will be rejected by PSS admission
  # instead — same behaviour as before Kyverno existed.
  failurePolicy: Ignore
  rules:
    - name: add-seccomp-profile
      match:
        any:
          - resources:
              kinds:
                - Pod
              namespaces:
                - register
      preconditions:
        all:
          # Only mutate pods that DON'T already have seccompProfile set.
          - key: "{{ request.object.spec.securityContext.seccompProfile.type || '' }}"
            operator: Equals
            value: ""
      mutate:
        patchStrategicMerge:
          spec:
            securityContext:
              seccompProfile:
                type: RuntimeDefault
