apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: kyverno
  namespace: argocd
spec:
  description: >-
    Kyverno admission controller. Installs CRDs, webhooks, and
    ClusterRoles. Scoped to the kyverno namespace.

  sourceRepos:
    - "https://kyverno.github.io/kyverno/"

  # Kyverno is a cluster-level operator that installs its own CRDs,
  # webhook configurations, and RBAC bindings.
  clusterResourceWhitelist:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding

  destinations:
    - server: https://kubernetes.default.svc
      namespace: kyverno

  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: apps
      kind: Deployment
    - group: apps
      kind: ReplicaSet
    - group: rbac.authorization.k8s.io
      kind: Role
    - group: rbac.authorization.k8s.io
      kind: RoleBinding
    - group: batch
      kind: Job
