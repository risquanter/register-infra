# Frontend image — built from risquanter/register repository via compose
# (the service is profile-gated; build context is the PARENT dir — sibling
# repos hdr-rng/vague-quantifier-logic are copied in, see register TODO §5b):
#   docker compose --profile frontend build frontend   # → local/frontend:<APP_VERSION>
#
# Local dev deploy: import + bump this tag (see docs/LOCAL-IMAGE-DEPLOY.md):
#   k3d image import local/frontend:<version> -c register-dev
# Production: push to GHCR and let Image Updater manage the tag.
image:
  repository: local/frontend
  tag: "0.3.0"
  pullPolicy: Never

# Single replica is sufficient. The frontend is stateless (all state is in
# the backend). Scaling requires no coordination.
replicaCount: 1

# Resource requests and limits.
# nginx serving static files is extremely lightweight.
resources:
  requests:
    cpu: 50m
    memory: 32Mi
  limits:
    cpu: 200m
    memory: 64Mi

service:
  type: ClusterIP
  # nginx listens on 8080 (non-privileged port, uid 101).
  port: 8080

# Environment injected at container startup via the image entrypoint script.
# The nginx.conf is baked into the image; BACKEND_URL sets the proxy target
# for API calls (see ADR-027, Dockerfile.frontend-prod).
env:
  - name: BACKEND_URL
    value: "http://register.register.svc.cluster.local:8090"

# imagePullSecrets: same pattern as register and irmin charts.
# Disabled for local dev (image pre-imported via k3d image import).
imagePullSecrets: []

serviceAccount:
  name: frontend
