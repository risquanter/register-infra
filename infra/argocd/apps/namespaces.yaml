apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: namespaces
  namespace: argocd
  annotations:
    # Bootstrap ordering (app-of-apps sync waves):
    #   0 namespaces → 1 kyverno → 2 postgresql
    #   → 3 keycloak/spicedb/opa/mesh-policy → 4 register/irmin/frontend
    # Wave 0: namespaces must exist — WITH PSS labels and LimitRange — before
    # any other app syncs. This is why every other app sets CreateNamespace=false.
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: platform
  source:
    repoURL: git@github.com:risquanter/register-infra.git
    targetRevision: HEAD
    path: infra/helm/namespaces
    helm:
      releaseName: namespaces
  destination:
    server: https://kubernetes.default.svc
    # Namespaces are cluster-scoped; default is used as the release namespace
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # Release namespace is `default`, which always exists; the namespaces
      # themselves are cluster-scoped resources created by the chart.
      - CreateNamespace=false
