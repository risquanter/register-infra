apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: spicedb
  namespace: argocd
  annotations:
    # Wave 3: platform service — the db-init hook needs PostgreSQL (wave 2).
    # Wave legend: see namespaces.yaml.
    argocd.argoproj.io/sync-wave: "3"
spec:
  # infra project — scoped to the infra namespace.
  # SpiceDB is infrastructure (authorization store), not application workload.
  # ADR-INFRA-003: all apps reference a scoped project, not default.
  project: infra
  source:
    # Local Helm chart — official authzed chart unavailable (ADR-INFRA-012).
    # Container image is the only external artifact (ghcr.io/authzed/spicedb).
    repoURL: git@github.com:risquanter/register-infra.git
    targetRevision: HEAD
    path: infra/helm/spicedb
    helm:
      releaseName: spicedb
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # infra namespace is created (with PSS labels + LimitRange) by the
      # namespaces app in wave 0 — never create here.
      - CreateNamespace=false
