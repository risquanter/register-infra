apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mesh-policy
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<org>/register-infra
    targetRevision: HEAD
    # Deploys all raw Kubernetes manifests under infra/k8s/:
    #   istio/         — RequestAuthentication, AuthorizationPolicy, EnvoyFilters
    #   opa/           — OPA Deployment, Service, ConfigMap, ext_authz EnvoyFilter
    #   network-policy/ — Cilium NetworkPolicy rules
    # Uses a directory glob so adding a new manifest file is sufficient —
    # no chart or Application changes needed.
    path: infra/k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    # Resources are namespace-scoped; each manifest declares its own namespace.
    namespace: register
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
