image:
  repository: register-server
  # tag is written by ArgoCD Image Updater on each new GHCR push.
  # For local dev, the image is built from ~/projects/register and imported
  # into k3d with: k3d image import register-server:local -c register-dev
  # In production, Image Updater will overwrite this with the real GHCR digest.
  tag: "local"
  pullPolicy: Never

# Number of application replicas.
# Single-node cluster: 1 is sufficient. Increase when moving to multi-node.
replicaCount: 1

# Resource requests and limits.
# Requests: guaranteed allocation. Limits: hard ceiling.
# Tune based on observed usage (kubectl top pods -n register).
resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

service:
  type: ClusterIP
  port: 8080

# Ingress via Istio Gateway — configure host and TLS here.
ingress:
  enabled: false
  host: register.example.com
  tlsSecretName: register-tls

# Environment variables injected into the application container.
# Sensitive values should reference a Kubernetes Secret, not be set inline.
#
# DB_* variables are NOT included here. The register app currently uses
# Irmin for risk tree persistence (repositoryType=irmin) and in-memory
# for workspace metadata (TrieMap). When WorkspaceStorePostgres is
# implemented (enterprise persistence tier), add DB_* env vars here
# referencing a dedicated register-db-credentials Secret in the register
# namespace — NOT the postgres-credentials Secret in infra (that holds
# the superuser and Keycloak passwords). See ADR-INFRA-006.
env:
  - name: KEYCLOAK_ISSUER
    value: "http://keycloak.infra.svc.cluster.local/realms/register"
  # Persistence: Irmin content-addressed backend for risk tree data.
  # The register app selects the repository implementation via this config.
  # Default in application.conf is "in-memory"; override to "irmin" for k8s.
  - name: REGISTER_REPOSITORY_TYPE
    value: "irmin"
  # Irmin URL: the irmin Service in the same namespace (register).
  - name: IRMIN_URL
    value: "http://irmin.register.svc.cluster.local:8080"

# imagePullSecrets references the GHCR pull secret created during bootstrap.
# Disabled for local dev (image pre-imported via k3d image import).
# Re-enable with ghcr-pull when deploying from GHCR.
imagePullSecrets: []

serviceAccount:
  name: register-runtime
