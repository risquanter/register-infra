apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    # Wave 1: the admission controller must be enforcing before any workloads
    # (waves 2+) are admitted. Wave legend: see namespaces.yaml.
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: kyverno
  source:
    # Upstream Kyverno Helm chart (CNCF Graduated).
    # Admission controller only — background/cleanup/reports controllers
    # disabled to minimise footprint (local dev cluster).
    repoURL: https://kyverno.github.io/kyverno/
    chart: kyverno
    targetRevision: "3.7.1"
    helm:
      valuesObject:
        admissionController:
          replicas: 1
        backgroundController:
          enabled: false
        cleanupController:
          enabled: false
        reportsController:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # kyverno namespace is created (with PSS labels + LimitRange) by the
      # namespaces app in wave 0 — never create here: an ArgoCD-created
      # namespace would lack the PSS labels.
      - CreateNamespace=false
      # Kyverno CRDs (clusterpolicies, policies) exceed the 262144-byte
      # annotation limit for client-side apply. Server-side apply avoids
      # the last-applied-configuration annotation entirely.
      - ServerSideApply=true
