---
# Default deny-all policy for the infra namespace.
# Same pattern as the register namespace: no pod can receive or initiate
# traffic unless an explicit allow policy exists below.
# Defense-in-depth layer alongside Istio mTLS (PeerAuthentication STRICT).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: infra
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow Istio Ambient HBONE tunnels between all pods in the infra namespace.
#
# In Istio Ambient mode, ztunnel wraps all pod-to-pod TCP traffic in HBONE on
# port 15008. Cilium sees port 15008, not the application port. Without this
# rule, default-deny-all blocks ALL intra-namespace cross-pod TCP connections.
#
# See the register namespace's allow-hbone-intra-namespace for the full
# explanation of why this is required and how enforcement layers work.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hbone-intra-namespace
  namespace: infra
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
      ports:
        - protocol: TCP
          port: 15008
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
      ports:
        - protocol: TCP
          port: 15008
---
# Allow HBONE ingress from the register namespace.
#
# When register namespace pods connect to infra services (PostgreSQL, Keycloak),
# ztunnel in the register namespace initiates an HBONE tunnel (port 15008) to
# ztunnel on the infra side. This rule allows that inbound HBONE connection.
# The per-service ingress rules below (allow-ingress-postgres-from-register, etc.)
# document the intended topology but cannot be enforced by Cilium for ambient
# traffic — Cilium only sees port 15008.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-hbone-from-register
  namespace: infra
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: register
      ports:
        - protocol: TCP
          port: 15008
---
# Allow the register application (via the waypoint) to reach PostgreSQL.
# Scoped to the register application pod — other pods in the register namespace
# (irmin, frontend, OPA, waypoint) do not need PostgreSQL access.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-postgres-from-register
  namespace: infra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: register
          podSelector:
            matchLabels:
              app.kubernetes.io/name: register
      ports:
        - protocol: TCP
          port: 5432
---
# Allow the register application (via the waypoint) to reach Keycloak.
# Scoped to the register application pod — other pods in the register namespace
# (irmin, frontend, OPA, waypoint) do not need Keycloak access.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-keycloak-from-register
  namespace: infra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: register
          podSelector:
            matchLabels:
              app.kubernetes.io/name: register
      ports:
        # Pod port only: NetworkPolicy matches after Service DNAT, so the
        # Service port (80) never appears here — Keycloak listens on 8080.
        - protocol: TCP
          port: 8080
---
# Allow Keycloak to reach PostgreSQL (internal dependency).
# Keycloak uses PostgreSQL as its backing store.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-postgres-from-keycloak
  namespace: infra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 5432
---
# Allow PostgreSQL egress to nowhere explicitly — it only needs to accept
# incoming connections. This rule is intentionally empty (no egress allowed).
# If PostgreSQL needs to reach external services (e.g., for WAL archiving),
# add a targeted egress rule here.

# Allow Keycloak egress to PostgreSQL (same namespace).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-keycloak-to-postgres
  namespace: infra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
---
# Allow ArgoCD to reach PostgreSQL and Keycloak for health checks.
# ArgoCD's application-controller checks target resources; the repo-server
# may need to reach the infra namespace for Helm template rendering.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-argocd
  namespace: infra
spec:
  podSelector: {}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: argocd
---
# Allow istiod to fetch JWKS from Keycloak.
# istiod retrieves the JWT signing public keys from Keycloak's OIDC discovery
# endpoint and distributes them to waypoint proxies via xDS. Without this rule,
# the default-deny blocks JWKS retrieval and ALL JWT validation fails — the
# waypoint cannot verify token signatures, breaking the entire auth chain.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-keycloak-from-istio-system
  namespace: infra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - protocol: TCP
          port: 8080
---
# Allow kubelet health probes to reach Keycloak on the management port (9000).
#
# Keycloak 26.x serves /health/live and /health/ready on a separate management
# interface (port 9000), not on the application port (8080). ztunnel SNATs the
# kubelet probe to 169.254.7.127; this rule admits exactly that probe path.
# Full mechanism: ADR-INFRA-004 §4 (canonical). Same allow-ingress-*-healthcheck
# pattern as the other mesh-enrolled services (see infra/k8s/network-policy/).
#
# Defense-in-depth layers on port 9000:
#   1. ztunnel SNAT: only local kubelet probes are rewritten to 169.254.7.127
#   2. CiliumNetworkPolicy: only 169.254.7.127 is allowed to reach 9000
#   3. PeerAuthentication: STRICT — pod-to-pod traffic to 9000 must present a
#      mesh certificate; ztunnel forwards the kubelet probe under STRICT, so
#      no PERMISSIVE exception exists (ADR-INFRA-004 §4)
#   4. No Service exposes 9000 — cluster-external access is impossible
#   5. Port 9000 serves only health/metrics, not the Keycloak admin console
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-keycloak-healthcheck
  namespace: infra
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: keycloak
  ingress:
    - fromCIDR:
        - 169.254.7.127/32
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
---
# Allow DNS egress for all infra pods.
# Required for Kubernetes internal DNS resolution (e.g., keycloak resolving
# postgresql-postgresql.infra.svc.cluster.local).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns
  namespace: infra
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
# Allow SpiceDB to receive HTTP (gRPC-gateway REST) from the register namespace.
# Scoped to the register application pod — other pods in the register namespace
# (irmin, frontend, OPA, waypoint) do not need SpiceDB access.
# The register app's AuthorizationServiceSpiceDB uses SafeUrl (HTTP in-cluster —
# mesh encrypts via HBONE). ADR-INFRA-010, ADR-INFRA-012 (TLS decision).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-spicedb-from-register
  namespace: infra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: spicedb
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: register
          podSelector:
            matchLabels:
              app.kubernetes.io/name: register
      ports:
        - protocol: TCP
          port: 8080
---
# Allow SpiceDB egress to PostgreSQL (datastore).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-spicedb-to-postgres
  namespace: infra
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: spicedb
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
---
# Allow kubelet health probes to reach SpiceDB on the gRPC port (50051).
#
# SpiceDB uses gRPC health probes. In Istio ambient mode, ztunnel SNATs kubelet
# probe traffic to 169.254.7.127. PeerAuthentication STRICT is overridden for
# port 50051 on SpiceDB pods via spicedb-grpc-probe-permissive (peer-authentication.yaml).
# This CiliumNetworkPolicy restricts who may send plaintext to port 50051:
# only the ztunnel SNAT address (= kubelet probe). All other 50051 traffic
# must come from the runner namespace (Phase 4, stub below) and travels via HBONE.
#
# Defense-in-depth layers on port 50051:
#   1. ztunnel SNAT: only local kubelet probes rewritten to 169.254.7.127
#   2. CiliumNetworkPolicy: only 169.254.7.127 may reach 50051 in plaintext
#   3. PeerAuthentication PERMISSIVE on port 50051 (spicedb pods only)
#   4. No Service exposes 50051 externally
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-spicedb-grpc-healthcheck
  namespace: infra
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: spicedb
  ingress:
    - fromCIDR:
        - 169.254.7.127/32
      toPorts:
        - ports:
            - port: "50051"
              protocol: TCP
