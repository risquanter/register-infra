---
# Frontend Service — the Istio Gateway (and kubectl port-forward for local dev)
# reaches the nginx SPA server on port {{ .Values.service.port }}.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "frontend.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "frontend.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
