apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  # The cascade finalizer ensures that deleting this Application also deletes
  # all child Applications it manages. Remove this finalizer if you want to
  # decommission the cluster without cascade-deleting running workloads.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  # The root app remains in the default project — it must be able to create
  # Application and AppProject resources in the argocd namespace.
  project: default
  sources:
    # Application manifests (the child apps).
    - repoURL: https://github.com/<org>/register-infra
      targetRevision: HEAD
      path: infra/argocd/apps
    # AppProject definitions — synced alongside apps so project references
    # resolve on first sync.
    - repoURL: https://github.com/<org>/register-infra
      targetRevision: HEAD
      path: infra/argocd/projects
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true      # remove resources that are no longer in git
      selfHeal: true   # revert any manual in-cluster changes
