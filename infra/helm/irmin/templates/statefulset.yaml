---
# Irmin StatefulSet — content-addressed persistence backend for risk tree data.
#
# StatefulSet (not Deployment) because Irmin writes to a persistent volume
# (/data). StatefulSet guarantees:
#   - stable network identity (irmin-0, irmin-1, ...)
#   - ordered, graceful rolling updates
#   - PVC is retained across pod restarts (no data loss on reschedule)
#
# Security: Irmin does not need Kubernetes API access. It only serves GraphQL
# on port {{ .Values.irmin.port }}. No RBAC required.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "irmin.name" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "irmin.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "irmin.name" . }}
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "irmin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "irmin.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: false

      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # Pod Security — restricted profile (same as rest of register namespace).
      # Irmin prod image runs as uid 65532 (dedicated non-root user, same as
      # register-server). fsGroup 65532 makes the PVC writable by the container.
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: irmin
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Override CMD to set port and data root from Helm values.
          args:
            - "--port"
            - "{{ .Values.irmin.port }}"
            - "--address"
            - "0.0.0.0"
            - "--root"
            - "{{ .Values.irmin.dataDir }}"
          ports:
            - name: http-graphql
              containerPort: {{ .Values.irmin.port }}
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: {{ .Values.irmin.dataDir }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # Container-level security hardening.
          # readOnlyRootFilesystem is enabled: the prod image is a static binary +
          # Alpine libc only; it writes exclusively to /data (the PVC mount).
          # The dev image (local/irmin-dev) cannot use this flag (opam writes to
          # /home/opam/.opam at runtime). Use the prod image in k8s.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          # Health check: GraphQL introspection query (same as Dockerfile HEALTHCHECK).
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "wget -q -O - --post-data='{\"query\":\"{ __typename }\"}' --header='Content-Type: application/json' http://127.0.0.1:{{ .Values.irmin.port }}/graphql | grep -q data"
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "wget -q -O - --post-data='{\"query\":\"{ __typename }\"}' --header='Content-Type: application/json' http://127.0.0.1:{{ .Values.irmin.port }}/graphql | grep -q data"
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 10

  {{- if .Values.persistence.enabled }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - {{ .Values.persistence.accessMode }}
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size }}
  {{- end }}
