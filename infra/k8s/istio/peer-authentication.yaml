---
# PeerAuthentication — enforce STRICT mTLS for the register namespace.
# Without this, a non-meshed pod could connect to meshed pods using plaintext,
# bypassing the waypoint and all L7 security controls.
#
# This is the mTLS half of THREAT-CATALOG T1 (mesh bypass prevention).
# The other half is NetworkPolicy (only waypoint can reach app pods).
#
# STRICT mode means:
#   - All incoming connections MUST present a valid mesh certificate (SPIFFE)
#   - Plaintext TCP connections are rejected at the ztunnel level
#   - Pods not enrolled in the mesh cannot reach pods in this namespace
#
# Currently applied per-namespace (register, argocd, infra). Mesh-wide STRICT
# (istio-system) is deferred until all namespaces are enrolled and tested.
# See TODO.md § Phase 3.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: register
spec:
  mtls:
    mode: STRICT
---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: argocd
spec:
  mtls:
    mode: STRICT
---
# Infra namespace — STRICT mTLS.
# PostgreSQL uses exec probes (pg_isready on 127.0.0.1) which bypass the network
# entirely. Keycloak's kubelet probe on management port 9000 passes under STRICT
# via ztunnel + the allow-ingress-keycloak-healthcheck CiliumNetworkPolicy — no
# PERMISSIVE exception needed (see the note below the register STRICT policy).
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: infra
spec:
  mtls:
    mode: STRICT
---
# ── Kubelet health probes need NO per-port PERMISSIVE exception ──────────────
#
# In ambient mode, ztunnel passes kubelet health probes through to the app even
# under STRICT mTLS (verified: pods pass HTTP liveness/readiness from scratch
# under namespace-wide STRICT with only the CiliumNetworkPolicy below). So every
# app/probe port stays STRICT for pod-to-pod traffic, and the ONLY thing that
# reaches a probe port in plaintext is the node-local kubelet probe — scoped by
# CiliumNetworkPolicy `fromCIDR: 169.254.7.127/32` (the ztunnel probe SNAT
# address). The relevant allow-ingress-*-healthcheck rules live in
# network-policy/{register,infra}.yaml:
#   OPA 8282, register 8091, frontend 8080, keycloak 9000.
#
# This is STRICTLY MORE SECURE than a port-level PERMISSIVE PeerAuthentication:
# PERMISSIVE makes the port accept UNauthenticated traffic from any workload that
# can reach it; the CiliumNP keeps the port STRICT-mTLS for all pod traffic and
# lets only the unspoofable node-local kubelet probe through. It also removes the
# THREAT-CATALOG concern about PERMISSIVE on frontend:8080 (which is both the app
# port and the probe port) — 8080 is now fully STRICT for pod traffic.
# (PostgreSQL uses exec probes on 127.0.0.1, which never touch the network.)
---
# SpiceDB gRPC port — allow plaintext kubelet health probes on port 50051.
#
# PENDING: this is the last remaining PERMISSIVE exception, and it should not exist.
# SpiceDB is accessed over HTTP REST (gRPC-gateway :8080) in this architecture, not
# gRPC (ADR-INFRA-010) — we make no gRPC calls. The fix is to switch SpiceDB's
# health probe from gRPC (:50051) to HTTP on the gateway, which removes the gRPC
# probe and this exception together, bringing SpiceDB in line with the CiliumNP-only
# approach used for every other service. Blocked only because SpiceDB is not yet
# deployed (no secret). See ADR-INFRA-004 §4.
#
# SpiceDB serves gRPC health probes (grpc.health.v1.Health/Check) on port 50051.
# Kubelet gRPC probes arrive via ztunnel SNAT (169.254.7.127) as plaintext.
# PERMISSIVE on port 50051 allows the probe while all other inbound traffic
# to SpiceDB must present a valid mesh certificate (STRICT namespace default).
#
# Port 8080 (HTTP gRPC-gateway REST, app client) remains STRICT.
# Port 50051 plaintext access is further restricted to 169.254.7.127/32
# by CiliumNetworkPolicy allow-ingress-spicedb-grpc-healthcheck.
#
# Same pattern as: opa-diag-permissive (8282), keycloak-mgmt-permissive (9000).
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: spicedb-grpc-probe-permissive
  namespace: infra
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: spicedb
  portLevelMtls:
    50051:
      mode: PERMISSIVE
