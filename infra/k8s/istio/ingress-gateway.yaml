# External ingress for the register app — HTTPS on :443, matching ADR-INFRA-007 §2.
#
# `gatewayClassName: istio` makes istiod auto-provision a Deployment + Service
# (type LoadBalancer) for this Gateway — declarative, no imperative step. Traffic
# path: host :8443 → k3d `--port "8443:443@loadbalancer"` → node :443 →
# servicelb(klipper) → this Gateway pod → HTTPRoute → frontend nginx.
#
# TLS-ONLY BY DESIGN. There is no plaintext :80 listener: exposing HTTP externally
# would send JWTs and capability URLs (which ARE the credential) in cleartext.
# TLS terminates here; the cert comes from cert-manager (Certificate below).
#   - Local: self-signed ClusterIssuer (infra/k8s/cert-manager/selfsigned-issuer.yaml).
#   - Hetzner: an ACME ClusterIssuer + real domain (env-specific; see that file).
#
# Reachability at L3/L4 is granted by the `world → gateway:443` CiliumNetworkPolicy
# in infra/k8s/network-policy/register.yaml. Everything behind the Gateway stays
# default-deny; L7 authz (JWT, capability URLs, OPA) is enforced at the waypoint.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: register-ingress-tls
  namespace: register
spec:
  secretName: register-ingress-tls          # the Gateway references this secret
  issuerRef:
    name: selfsigned-local
    kind: ClusterIssuer
  commonName: localhost
  dnsNames:
    - localhost
    - register.local                         # add the real hostname on Hetzner
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: register-ingress
  namespace: register
spec:
  gatewayClassName: istio
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - name: register-ingress-tls
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: register-ingress
  namespace: register
spec:
  parentRefs:
    - name: register-ingress
  rules:
    - backendRefs:
        - name: frontend
          port: 8080
