apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: opa
  namespace: argocd
  annotations:
    # Wave 3: platform service — synced alongside mesh-policy so the OPA
    # deployment exists when the fail-closed ext_authz filter is applied.
    # Wave legend: see namespaces.yaml.
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: platform
  source:
    repoURL: git@github.com:risquanter/register-infra.git
    targetRevision: HEAD
    path: infra/helm/opa
    helm:
      releaseName: opa
  destination:
    server: https://kubernetes.default.svc
    namespace: register
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
