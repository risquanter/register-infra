apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mesh-policy
  namespace: argocd
  annotations:
    # Wave 3: security policy layer (mTLS, JWT, ext_authz, NetworkPolicy) in
    # place before app workloads (wave 4) receive traffic.
    # Wave legend: see namespaces.yaml.
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: platform
  source:
    repoURL: git@github.com:risquanter/register-infra.git
    targetRevision: HEAD
    # Deploys all raw Kubernetes manifests under infra/k8s/:
    #   istio/          — RequestAuthentication, AuthorizationPolicy, EnvoyFilters,
    #                     PeerAuthentication (register + argocd namespaces)
    #   opa/            — ext_authz EnvoyFilter (wires waypoint → OPA gRPC)
    #   network-policy/ — NetworkPolicy rules (register + infra namespaces)
    #   rbac/           — Role definitions (viewer, deployer, ci-authz)
    # Uses a directory glob so adding a new manifest file is sufficient —
    # no chart or Application changes needed.
    path: infra/k8s
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    # Resources are namespace-scoped; each manifest declares its own namespace.
    namespace: register
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
