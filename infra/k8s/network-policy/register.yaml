---
# Default deny-all policy for the register namespace.
# No pod can receive or initiate traffic unless an explicit allow policy exists.
# This is the starting point — add targeted allow policies on top of this.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: register
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow the register application to reach PostgreSQL in the infra namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-postgres
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: register
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
---
# Allow the register application to reach Keycloak in the infra namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-keycloak
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: register
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
          podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8080
---
# Allow ingress to the register application from the Istio waypoint proxy.
# The waypoint is what terminates external traffic after the mesh policy checks.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-waypoint
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: register
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: register
          podSelector:
            matchLabels:
              gateway.istio.io/managed: istio.io-mesh-controller
---
# Allow the Istio waypoint to call OPA over gRPC (ext_authz).
# The waypoint is the ext_authz client; OPA is the server on port 9191.
# Without this rule the default-deny-all policy would block the call and
# OPA's fail-closed mode would return 403 for every request.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-opa-from-waypoint
  namespace: register
spec:
  podSelector:
    matchLabels:
      app: opa
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              gateway.istio.io/managed: istio.io-mesh-controller
      ports:
        - protocol: TCP
          port: 9191
---
# Allow the waypoint to egress to OPA on port 9191.
# The waypoint pod is also subject to the default-deny-all egress rule.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-waypoint-to-opa
  namespace: register
spec:
  podSelector:
    matchLabels:
      gateway.istio.io/managed: istio.io-mesh-controller
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: opa
      ports:
        - protocol: TCP
          port: 9191
---
# Allow the waypoint to forward approved requests to the register app.
# After JWT validation and OPA ext_authz pass, the waypoint proxies the
# request to the application pod on port 8080. Without this rule, the
# default-deny blocks the final hop and the app never receives traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-waypoint-to-register
  namespace: register
spec:
  podSelector:
    matchLabels:
      gateway.istio.io/managed: istio.io-mesh-controller
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: register
      ports:
        - protocol: TCP
          port: 8080
---
# Allow kubelet health probes to reach the OPA diagnostic port (8282).
#
# SECURITY NOTE: standard NetworkPolicy cannot select the kubelet by source —
# it runs on the node host network, not inside any pod. CiliumNetworkPolicy's
# fromEntities: host targets exactly the local node process (kubelet), closing
# the gap that a standard NetworkPolicy would leave open to all cluster pods.
#
# WHY NOT standard NetworkPolicy with open `from:`?
# Port 8282 also serves /metrics (Prometheus), which leaks OPA decision rates,
# latency, and error counts. Opening it to any pod violates the principle of
# least privilege and contradicts ADR-INFRA-004 (targeted allow rules only).
#
# DEPENDENCY: requires Cilium CNI (already the cluster's CNI — no new dependency).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-opa-healthcheck
  namespace: register
spec:
  endpointSelector:
    matchLabels:
      app: opa
  ingress:
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "8282"
              protocol: TCP
---
# Allow DNS egress for all register pods (app, OPA, waypoint).
# Required for Kubernetes service discovery (e.g., resolving
# postgresql-postgresql.infra.svc.cluster.local).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns
  namespace: register
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
