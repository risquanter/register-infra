apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: app
  namespace: argocd
spec:
  description: >-
    Application workloads: the register Scala/ZIO service. Restricted to the
    register namespace. Cannot create cluster-scoped resources, Istio policy,
    or deploy outside register.

  sourceRepos:
    - "git@github.com:risquanter/register-infra.git"

  # No cluster-scoped resources allowed.
  clusterResourceWhitelist: []

  destinations:
    - server: https://kubernetes.default.svc
      namespace: register

  # Resource kinds the register and irmin Helm charts create.
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: PersistentVolumeClaim
    - group: apps
      kind: Deployment
    - group: apps
      kind: StatefulSet
