apiVersion: v1
kind: Service
metadata:
  name: {{ include "register.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "register.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "register.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    # Health port is NOT exposed as a Service port — it is accessed by the
    # kubelet directly on the pod IP. Exposing it would make it reachable
    # inside the cluster, which contradicts its probe-only purpose.
