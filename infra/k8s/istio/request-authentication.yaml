apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: keycloak-jwt
  # Applied to the register namespace — all pods in this namespace must
  # present a valid JWT issued by Keycloak, or the request is rejected.
  namespace: register
  annotations:
    # ISSUER-SYNC: the issuer URL appears in two places that must match:
    #   1. This file: spec.jwtRules[0].issuer + jwksUri
    #   2. infra/helm/keycloak/values.yaml: hostname (templated into KC_HOSTNAME,
    #      which Keycloak stamps as the JWT `iss` claim — see deployment.yaml)
    # For production (HTTPS): change both to https://keycloak.example.com/realms/register
    # See ADR-023 (TLS by default) — HTTPS is required for production.
    register-infra/issuer-sync: "http://keycloak.infra.svc.cluster.local/realms/register"
spec:
  # selector: empty means this policy applies to all workloads in the namespace
  selector: {}
  jwtRules:
    - # issuer must match the Keycloak realm URL exactly.
      # Update this when Keycloak's external URL is configured.
      issuer: "http://keycloak.infra.svc.cluster.local/realms/register"
      # jwksUri: Istio fetches the public signing keys from this endpoint.
      # Istio caches and periodically refreshes the JWKS automatically.
      jwksUri: "http://keycloak.infra.svc.cluster.local/realms/register/protocol/openid-connect/certs"
      # audiences: reject JWTs not intended for the register API.
      # Without this, any valid token from the same realm (e.g., issued for a
      # different OIDC client) would be accepted — token confusion attack.
      audiences:
        - "register-api"
      # outputClaimToHeaders: the waypoint injects validated JWT claims as
      # request headers. The app reads x-user-id/x-user-email/x-user-roles
      # and contains zero JWT parsing code (ADR-012 §5-§6).
      # The EnvoyFilter (strip-identity-headers) removes these headers from
      # inbound traffic BEFORE JWT validation, so the values here are trusted
      # infrastructure assertions — not client-supplied.
      outputClaimToHeaders:
        - header: x-user-id
          claim: sub
        - header: x-user-email
          claim: email
        - header: x-user-roles
          claim: realm_access.roles
      # forwardOriginalToken is NOT set — the app never receives the raw JWT.
      # See ADR-012 §6, AUTHORIZATION-PLAN L1.5.
