apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "keycloak.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "keycloak.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "keycloak.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "keycloak.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      automountServiceAccountToken: false

      # Pod Security: all containers run as non-root.
      # The official Keycloak image runs as uid 1000 (keycloak user).
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault

      # Init container: copy the Keycloak installation to a writable emptyDir.
      # Keycloak start-dev triggers a Quarkus augmentation build that writes
      # throughout /opt/keycloak/lib/ (JAR rewriting, bytecode generation).
      # Mounting the entire /opt/keycloak as emptyDir — populated by this init
      # container — allows readOnlyRootFilesystem: true on both containers.
      initContainers:
        - name: copy-keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # Copy the Keycloak installation to the writable emptyDir.
          # If realm import is enabled, also place the realm JSON in
          # /mnt/keycloak/data/import/ where --import-realm expects it.
          command:
            - sh
            - -c
            - |-
              cp -a /opt/keycloak/. /mnt/keycloak/ || true
              {{- if .Values.realm.importEnabled }}
              mkdir -p /mnt/keycloak/data/import
              cp /opt/keycloak-realm/register-realm.json /mnt/keycloak/data/import/register-realm.json
              {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: keycloak-home
              mountPath: /mnt/keycloak
            {{- if .Values.realm.importEnabled }}
            - name: realm-import
              mountPath: /opt/keycloak-realm
              readOnly: true
            {{- end }}

      containers:
        - name: keycloak
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}

          # Official Keycloak start command.
          # --optimized is omitted: the image is not a custom build.
          # Development mode disables HTTPS requirement (appropriate for
          # local k3d where TLS is terminated at the Istio Gateway).
          args:
            - start-dev
            - --http-port={{ .Values.service.containerPort }}
            - --health-enabled=true
            {{- if .Values.realm.importEnabled }}
            - --import-realm
            {{- end }}

          ports:
            - name: http
              containerPort: {{ .Values.service.containerPort }}
              protocol: TCP
            - name: management
              containerPort: 9000
              protocol: TCP

          # Container-level security hardening.
          # readOnlyRootFilesystem: true — Keycloak's start-dev mode triggers a
          # Quarkus augmentation build that rewrites JARs in /opt/keycloak/lib/.
          # The init container copies the image contents to a writable emptyDir
          # mounted at /opt/keycloak, so the root filesystem stays immutable.
          # /tmp is a separate emptyDir for JVM temporaries.
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]

          volumeMounts:
            - name: keycloak-home
              mountPath: /opt/keycloak
            - name: tmp
              mountPath: /tmp

          env:
            # -- Database connection --
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL
              # sslmode=disable: ztunnel already provides mTLS encryption for
              # pod-to-pod traffic (HBONE). The PostgreSQL JDBC driver defaults
              # to sslmode=prefer and attempts an SSL upgrade handshake, which
              # fails through the ambient mesh (EOFException at enableSSL).
              # Application-level SSL is redundant with ambient mTLS.
              value: "jdbc:postgresql://{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.database.name }}?sslmode=disable"
            - name: KC_DB_USERNAME
              value: {{ .Values.database.user }}
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.database.existingSecret }}
                  key: {{ .Values.database.passwordKey }}

            # -- Admin credentials (initial setup only) --
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              value: {{ .Values.admin.user }}
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.existingSecret }}
                  key: {{ .Values.admin.passwordKey }}

            # -- Proxy configuration --
            # Keycloak runs behind the Istio Gateway / waypoint.
            # "edge" mode: Keycloak trusts X-Forwarded-* headers and serves HTTP.
            - name: KC_PROXY_HEADERS
              value: xforwarded
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HOSTNAME_STRICT
              value: "false"

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # Health probes use the built-in /health endpoints.
          # Keycloak 26.x serves health on a SEPARATE management interface
          # (port 9000), not on the application port (8080).
          livenessProbe:
            httpGet:
              path: /health/live
              port: management
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5

          readinessProbe:
            httpGet:
              path: /health/ready
              port: management
            initialDelaySeconds: 30
            periodSeconds: 10

          startupProbe:
            httpGet:
              path: /health/ready
              port: management
            # Keycloak JVM startup is slow — allow up to 5 minutes.
            # startup_probe_period * failure_threshold = 10 * 30 = 300s
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 30

      volumes:
        - name: keycloak-home
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        {{- if .Values.realm.importEnabled }}
        - name: realm-import
          configMap:
            name: {{ include "keycloak.fullname" . }}-realm
        {{- end }}
