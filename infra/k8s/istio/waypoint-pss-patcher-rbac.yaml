---
# ServiceAccount used by the waypoint PSS patch PostSync hook Job.
# Permanent resource — not a hook. Created during normal mesh-policy sync.
# automountServiceAccountToken: false; the hook Job mounts it explicitly.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: waypoint-pss-patcher
  namespace: register
automountServiceAccountToken: false
---
# Role: minimal permission to patch only the waypoint Deployment.
#
# resourceNames scopes the grant to the single "waypoint" Deployment name,
# following least-privilege (ADR-INFRA-003). The patcher cannot modify any
# other Deployment in the register namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: waypoint-pss-patcher
  namespace: register
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    resourceNames: ["waypoint"]
    verbs: ["get", "patch"]
---
# RoleBinding: binds the above Role to the waypoint-pss-patcher ServiceAccount.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: waypoint-pss-patcher
  namespace: register
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: waypoint-pss-patcher
subjects:
  - kind: ServiceAccount
    name: waypoint-pss-patcher
    namespace: register
