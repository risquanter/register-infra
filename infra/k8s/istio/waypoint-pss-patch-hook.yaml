---
# ArgoCD PostSync hook: patches the waypoint Deployment to add
# seccompProfile.type=RuntimeDefault after every mesh-policy sync.
#
# WHY THIS EXISTS
# The Istio gateway controller (istiod) auto-generates the waypoint Deployment
# from an internal template when it sees a Gateway resource of class
# istio-waypoint. That template does not include seccompProfile in the pod
# security context. The register namespace enforces restricted PSS, which
# requires seccompProfile.type=RuntimeDefault or Localhost on every pod. Without
# the patch, the waypoint pod is rejected by the Kubernetes admission controller
# before it even reaches the scheduler.
#
# LIFECYCLE
# - ArgoCD runs this Job after every successful sync of the mesh-policy app.
# - BeforeHookCreation deletes the previous Job before running a new one.
# - ttlSecondsAfterFinished: 300 cleans up completed Jobs automatically.
# - The Job is idempotent: `--type=json` with "add" op is a no-op if the
#   path already exists with the correct value.
#
# WHEN THIS WILL BE OBSOLETE
# When the Istio gateway controller adds seccompProfile natively to the waypoint
# Deployment template. Track upstream: https://github.com/istio/istio/issues
# (search: waypoint seccompProfile restricted PSS). Remove this file and the
# associated RBAC (waypoint-pss-patcher-rbac.yaml) when resolved.
#
# SECURITY
# - ServiceAccount waypoint-pss-patcher has patch on deployments/waypoint only
#   (resourceNames scoped — cannot modify any other Deployment).
# - Pod runs as nonRoot, readOnlyRootFilesystem, drops ALL capabilities,
#   RuntimeDefault seccompProfile — complies with register restricted PSS.
# - emptyDir at /tmp allows kubectl to write its cache; no persistent state.
apiVersion: batch/v1
kind: Job
metadata:
  name: waypoint-pss-patch
  namespace: register
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: waypoint-pss-patcher
      automountServiceAccountToken: true
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: patcher
          image: registry.k8s.io/kubectl:v1.31.5
          imagePullPolicy: IfNotPresent
          env:
            - name: HOME
              value: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          command:
            - kubectl
            - -n
            - register
            - patch
            - deployment
            - waypoint
            - --type=json
            - "-p=[{\"op\":\"add\",\"path\":\"/spec/template/spec/securityContext/seccompProfile\",\"value\":{\"type\":\"RuntimeDefault\"}}]"
