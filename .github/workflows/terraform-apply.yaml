name: Terraform Apply

# TEMPORARILY DISABLED — no Hetzner account yet.
# Restore push trigger when cloud provisioning is needed.
# Original trigger: push to main on infra/terraform/**
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  apply:
    name: terraform apply
    runs-on: ubuntu-latest
    # environment: production creates a GitHub environment gate.
    # Configure required reviewers in Settings → Environments → production.
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.10.0"

      - name: Terraform Init
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
        run: terraform init -input=false

      - name: Terraform Apply
        working-directory: infra/terraform
        env:
          TF_VAR_hcloud_token: ${{ secrets.HCLOUD_TOKEN }}
          TF_VAR_ssh_key_name: ${{ secrets.HCLOUD_SSH_KEY_NAME }}
          TF_VAR_operator_cidr: ${{ secrets.OPERATOR_CIDR }}
        run: terraform apply -input=false -auto-approve
