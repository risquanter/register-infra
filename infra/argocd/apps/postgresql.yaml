apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  annotations:
    # Wave 2: data layer — Keycloak and SpiceDB (wave 3) depend on it.
    # Wave legend: see namespaces.yaml.
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: infra
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: "18.5.5"
    helm:
      releaseName: postgresql
      valuesObject:
        auth:
          # existingSecret references a Kubernetes Secret that ArgoCD creates
          # from the SOPS-encrypted file infra/secrets/postgres.enc.yaml.
          existingSecret: postgres-credentials
          secretKeys:
            adminPasswordKey: postgres-password
        primary:
          persistence:
            enabled: true
            size: 10Gi
          containerSecurityContext:
            enabled: true
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop: ["ALL"]
        # Disable the bundled PgBouncer — not needed at this scale.
        pgbouncer:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: infra
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      # infra namespace is created (with PSS labels + LimitRange) by the
      # namespaces app in wave 0 — never create here.
      - CreateNamespace=false
