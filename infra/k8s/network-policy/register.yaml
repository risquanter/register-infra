---
# Default deny-all policy for the register namespace.
# No pod can receive or initiate traffic unless an explicit allow policy exists.
# This is the starting point — add targeted allow policies on top of this.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: register
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# Allow the register application to reach PostgreSQL in the infra namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-postgres
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: register
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
          podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
---
# Allow the register application to reach Keycloak in the infra namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-keycloak
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: register
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
          podSelector:
            matchLabels:
              app.kubernetes.io/name: keycloak
      ports:
        - protocol: TCP
          port: 80
        - protocol: TCP
          port: 8080
---
# Allow ingress to the register application from the Istio waypoint proxy.
# The waypoint is what terminates external traffic after the mesh policy checks.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-from-waypoint
  namespace: register
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: register
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: register
          podSelector:
            matchLabels:
              gateway.istio.io/managed: istio.io-mesh-controller
---
# Allow the Istio waypoint to call OPA over gRPC (ext_authz).
# The waypoint is the ext_authz client; OPA is the server on port 9191.
# Without this rule the default-deny-all policy would block the call and
# OPA's fail-closed mode would return 403 for every request.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-opa-from-waypoint
  namespace: register
spec:
  podSelector:
    matchLabels:
      app: opa
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              gateway.istio.io/managed: istio.io-mesh-controller
      ports:
        - protocol: TCP
          port: 9191
---
# Allow the waypoint to egress to OPA on port 9191.
# The waypoint pod is also subject to the default-deny-all egress rule.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-waypoint-to-opa
  namespace: register
spec:
  podSelector:
    matchLabels:
      gateway.istio.io/managed: istio.io-mesh-controller
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: opa
      ports:
        - protocol: TCP
          port: 9191
---
# Allow the waypoint to forward approved requests to the register app.
# After JWT validation and OPA ext_authz pass, the waypoint proxies the
# request to the application pod on port 8080. Without this rule, the
# default-deny blocks the final hop and the app never receives traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-waypoint-to-register
  namespace: register
spec:
  podSelector:
    matchLabels:
      gateway.istio.io/managed: istio.io-mesh-controller
  policyTypes:
    - Egress
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: register
      ports:
        - protocol: TCP
          port: 8080
---
# Allow kubelet health probes to reach the OPA diagnostic port (8282).
#
# SECURITY NOTE: In Istio ambient mode, ztunnel uses SNAT to rewrite the source
# of kubelet health probes to 169.254.7.127 (a well-known link-local address)
# before they enter the pod's network namespace. This causes Cilium to see the
# probe as identity "world" instead of "host", so fromEntities: host does not
# match. fromCIDR: 169.254.7.127/32 targets exactly the ztunnel probe SNAT
# address — only traffic that ztunnel has already identified as a health probe
# reaches OPA on port 8282 via this path.
#
# Defense-in-depth layers on port 8282:
#   1. ztunnel SNAT: only local kubelet probes are rewritten to 169.254.7.127
#   2. CiliumNetworkPolicy: only 169.254.7.127 is allowed to reach 8282
#   3. PeerAuthentication (opa-diag-permissive): port 8282 accepts plaintext
#   4. No Service exposes 8282 — cluster-external access is impossible
#   5. OPA's diagnostic port also serves /metrics (Prometheus), but only the
#      ztunnel-SNATted kubelet can reach 8282, and it never requests /metrics
#
# DEPENDENCY: requires Cilium CNI + Istio ambient mode (both already in use).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-ingress-opa-healthcheck
  namespace: register
spec:
  endpointSelector:
    matchLabels:
      app: opa
  ingress:
    - fromCIDR:
        - 169.254.7.127/32
      toPorts:
        - ports:
            - port: "8282"
              protocol: TCP
---
# Allow DNS egress for all register pods (app, OPA, waypoint).
# Required for Kubernetes service discovery (e.g., resolving
# postgresql-postgresql.infra.svc.cluster.local).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-egress-dns
  namespace: register
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to: []
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
